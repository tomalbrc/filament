<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>FAE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.14"></script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

    <style>
        .editor-container { overflow: scroll; }
        textarea.json-content {
            font-family: monospace;
            min-height: 60vh;
            white-space: pre;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #555;
        }
    </style>
</head>
<body data-bs-theme="dark" class="d-flex flex-column vh-100">

<nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Filament Asset Editor</span>
    </div>
</nav>

<div class="container-fluid flex-grow-1 overflow-hidden">
    <div class="row h-100">

        <div id="sidebar" class="col-3 border-end overflow-auto p-0 h-100">
            <div class="sticky-top bg-body p-2 border-bottom">
                <label for="file-select" class="form-label">Select File Type</label>
                <select id="file-select" name="type" class="form-select"
                        hx-get="/rest/files"
                        hx-target="#files-list"
                        hx-trigger="change delay:100ms"
                        hx-include="#file-search">
                    <option value="all">All</option>
                    <option value="item">Item</option>
                    <option value="block">Block</option>
                    <option value="decoration">Decoration</option>
                </select>

                <input type="text"
                       id="file-search"
                       name="search"
                       class="form-control mt-2"
                       placeholder="Search..."
                       hx-get="/rest/files"
                       hx-target="#files-list"
                       hx-trigger="keyup changed delay:300ms">
            </div>

            <div class="p-2">
                <table class="table table-hover">
                    <tbody id="files-list" hx-get="/rest/files" hx-trigger="load"></tbody>
                </table>
            </div>
        </div>

        <div id="main-panel" class="col-9 px-2 overflow-auto h-100">
            <div id="editor-pane">
            </div>
        </div>

    </div>
</div>

</body>
</html>
